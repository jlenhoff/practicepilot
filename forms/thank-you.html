<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Pilot — You're on the Runway</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --white: #f2ede8;
    --muted: rgba(242,237,232,0.45);
    --orange: #ff6b35;
    --orange-dim: rgba(255,107,53,0.1);
    --orange-glow: rgba(255,107,53,0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Karla', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(255,107,53,0.015) 40px,
      rgba(255,107,53,0.015) 41px
    );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 3rem 2rem;
    max-width: 540px;
    width: 100%;
    animation: fadeUp 0.7s ease both;
  }

  .wordmark {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 4rem;
  }

  .wordmark-icon {
    width: 28px;
    height: 28px;
    background: var(--orange);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
  }

  .wordmark-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: -0.02em;
  }

  .wordmark-text span { color: var(--orange); }

  .icon {
    width: 72px;
    height: 72px;
    background: var(--orange-dim);
    border: 1px solid rgba(255,107,53,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin: 0 auto 2.5rem;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 1.25rem;
  }

  h1 .accent { color: var(--orange); }

  p {
    font-size: 1rem;
    line-height: 1.8;
    color: var(--muted);
    max-width: 400px;
    margin: 0 auto;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: rgba(255,107,53,0.3);
    margin: 2.5rem auto;
  }

  .back-link {
    font-size: 0.75rem;
    color: rgba(242,237,232,0.25);
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--muted); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">
  <div class="wordmark">
    <div class="wordmark-icon">✈</div>
    <div class="wordmark-text">Practice <span>Pilot</span></div>
  </div>

  <div class="icon">✈</div>

  <h1>You're on the <span class="accent">runway.</span></h1>

  <p>We received your information and will be in touch within 24 hours to confirm your audit time.</p>

  <div class="divider"></div>

  <a href="https://practicepilot.app" class="back-link">← practicepilot.app</a>
</div>

</body>
</html>
